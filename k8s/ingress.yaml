# ---------------------------------------------------------------------------
# Ingress — OPTIONAL. Read before applying.
#
# This manifest assumes your cluster has an nginx ingress controller and a
# public Azure Load Balancer. It works out of the box with infra/aks-standalone/.
#
# If your organization already has an ingress setup, replace or skip this file:
#
#   Pattern A — Internal nginx (private VNet only):
#     Change the annotation to:
#       kubernetes.io/ingress.class: nginx
#       nginx.ingress.kubernetes.io/ssl-redirect: "false"
#     And set controller.service.loadBalancerIP to an internal subnet IP.
#
#   Pattern B — Azure API Management in front (no public ingress):
#     Delete this file entirely. Expose the Service as ClusterIP (already the
#     default in service.yaml) and configure APIM to route to the internal
#     Service DNS: snow-terraform-agent.<namespace>.svc.cluster.local
#
#   Pattern C — Private endpoint / no public IP:
#     Delete this file. Use a private ingress controller or configure your
#     org's existing internal gateway to forward to the ClusterIP Service.
#
# In all cases the Deployment and Service are unchanged — only the
# traffic entry point differs.
# ---------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: snow-terraform-agent
  labels:
    app: snow-terraform-agent
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    # Replace with the hostname from Terraform output or your org's ingress hostname.
    # Standalone path: snow-agent.eastus2.cloudapp.azure.com
    # Existing cluster path: whatever your ingress controller is bound to.
    - host: <DNS_LABEL>.eastus2.cloudapp.azure.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: snow-terraform-agent
                port:
                  number: 80
