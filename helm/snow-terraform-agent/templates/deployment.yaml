apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "snow-terraform-agent.fullname" . }}
  labels:
    {{- include "snow-terraform-agent.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "snow-terraform-agent.selectorLabels" . | nindent 6 }}
      role: api
  template:
    metadata:
      labels:
        {{- include "snow-terraform-agent.selectorLabels" . | nindent 8 }}
        role: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "snow-terraform-agent.fullname" . }}-config
            - secretRef:
                name: {{ include "snow-terraform-agent.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
